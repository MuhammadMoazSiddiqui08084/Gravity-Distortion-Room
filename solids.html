<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Platonic Solids Viewer</title>

<style>
body{
margin:0;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
position:relative;
font-family:"Trebuchet MS","Verdana",sans-serif;
color:#222;
}

canvas{
border:2px solid #222;
}

#help{
position:absolute;
top:12px;
left:12px;
padding:10px 12px;
border:1px solid #bbb;
background:rgba(255,255,255,0.9);
font-size:12px;
line-height:1.4;
max-width:360px;
pointer-events:none;
}

#help .title{
font-size:13px;
font-weight:bold;
margin-bottom:4px;
}

#help .row{
margin:2px 0;
}
</style>

</head>

<body>

<div id="help">
<div class="title">Controls</div>
<div class="row">1-5: Tetrahedron, Cube, Octahedron, Dodecahedron, Icosahedron</div>
<div class="row">D: Toggle dual</div>
<div class="row">W: Toggle wireframe (hidden lines dotted)</div>
</div>

<canvas id="glcanvas" width="800" height="800"></canvas>

<script id="vertex-shader" type="x-shader/x-vertex">

attribute vec3 aPosition;
uniform mat4 uModel;
uniform mat4 uProjection;

void main(){
    gl_Position = uProjection * uModel * vec4(aPosition,1.0);
}

</script>

<script id="fragment-shader" type="x-shader/x-fragment">

precision mediump float;
uniform vec4 uColor;

void main(){
    gl_FragColor = uColor;
}

</script>

<script src="webgl-utils.js"></script>
<script src="initShaders.js"></script>
<script src="common.js"></script>
<script src="solids.js"></script>

</body>
</html>
