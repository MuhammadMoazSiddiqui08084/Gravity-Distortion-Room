<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Escher Staircase — CS440</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #04060a;
    color: #c8d8e8;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    gap: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #4ecdc4;
    text-shadow: 0 0 24px #4ecdc488;
  }

  #canvas-wrap {
    position: relative;
    border: 1px solid #1a2a3a;
    box-shadow: 0 0 60px #4ecdc418, 0 0 120px #4ecdc410;
  }

  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }

  #hud {
    position: absolute;
    top: 10px; left: 12px;
    font-size: 0.67rem;
    color: #4ecdc4;
    line-height: 2.0;
    pointer-events: none;
    text-shadow: 0 0 8px #4ecdc466;
  }

  .controls {
    display: flex; gap: 9px;
    flex-wrap: wrap; justify-content: center;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    background: transparent;
    border: 1px solid #1a2a3a;
    color: #5a8a88;
    padding: 5px 13px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  button:hover { border-color: #4ecdc4; color: #fff; box-shadow: 0 0 10px #4ecdc433; }
  button.active { border-color: #4ecdc4; color: #4ecdc4; box-shadow: 0 0 14px #4ecdc455; }

  .sliders {
    display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
    font-size: 0.65rem; color: #2a4a48;
  }
  .sg { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px; height: 2px;
    background: #0a1a20; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 9px; height: 9px;
    background: #4ecdc4; border-radius: 50%;
  }

  #info { font-size: 0.62rem; color: #1a3030; text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<h1>Object III — Escher Staircase</h1>

<div id="canvas-wrap">
  <canvas id="gl" width="700" height="520"></canvas>
  <div id="hud">
    <div>SHADING: <span id="hudShade">SMOOTH</span></div>
    <div>STEPS: <span id="hudSteps">16</span></div>
    <div>GRAVITY: <span id="hudGrav">–Y (FLOOR)</span></div>
    <div>ROT Y: <span id="hudRY">0°</span></div>
  </div>
</div>

<div class="controls">
  <button id="btnWire">WIREFRAME [1]</button>
  <button id="btnFlat">FLAT [2]</button>
  <button id="btnSmooth" class="active">SMOOTH [3]</button>
  <button id="btnGrav">FLIP GRAVITY [G]</button>
  <button id="btnSpin">AUTO SPIN [S]</button>
  <button id="btnReset">RESET [R]</button>
</div>

<div class="sliders">
  <div class="sg">
    <label>STEPS: <span id="lblSteps">16</span></label>
    <input type="range" id="slSteps" min="4" max="32" value="16">
  </div>
  <div class="sg">
    <label>STEP HEIGHT</label>
    <input type="range" id="slHeight" min="10" max="60" value="25">
  </div>
  <div class="sg">
    <label>STEP DEPTH</label>
    <input type="range" id="slDepth" min="10" max="60" value="28">
  </div>
  <div class="sg">
    <label>RADIUS</label>
    <input type="range" id="slRadius" min="30" max="120" value="70">
  </div>
</div>

<div id="info">
  LEFT DRAG — rotate &nbsp;|&nbsp; SCROLL — zoom &nbsp;|&nbsp;
  1/2/3 — shading &nbsp;|&nbsp; G — gravity &nbsp;|&nbsp; S — spin &nbsp;|&nbsp; R — reset
</div>

<script>
// ─── WebGL init ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl');
if (!gl) alert('WebGL not supported');
gl.enable(gl.DEPTH_TEST);
gl.enable(gl.CULL_FACE);

// ─── Shader sources ───────────────────────────────────────────────────────────

// WIREFRAME
const vsWire = `
  attribute vec3 aPos;
  uniform mat4 uMVP;
  void main(){ gl_Position = uMVP * vec4(aPos,1.0); }
`;
const fsWire = `
  precision mediump float;
  uniform vec3 uWireColor;
  void main(){ gl_FragColor = vec4(uWireColor,1.0); }
`;

// FLAT — lighting done per-vertex with face normals
const vsFlat = `
  attribute vec3 aPos;
  attribute vec3 aNorm;
  uniform mat4 uMVP;
  uniform mat3 uNormalMat;
  uniform vec3 uLightDir;
  uniform vec3 uColor;
  varying vec3 vColor;
  void main(){
    vec3 N = normalize(uNormalMat * aNorm);
    float d = max(dot(N, uLightDir), 0.0);
    vColor = uColor * (0.18 + d * 0.82);
    gl_Position = uMVP * vec4(aPos,1.0);
  }
`;
const fsFlat = `
  precision mediump float;
  varying vec3 vColor;
  void main(){ gl_FragColor = vec4(vColor,1.0); }
`;

// SMOOTH — Phong per-fragment
const vsSmooth = `
  attribute vec3 aPos;
  attribute vec3 aNorm;
  uniform mat4 uMVP;
  uniform mat4 uModel;
  uniform mat3 uNormalMat;
  varying vec3 vNorm;
  varying vec3 vFragPos;
  void main(){
    vFragPos = vec3(uModel * vec4(aPos,1.0));
    vNorm    = uNormalMat * aNorm;
    gl_Position = uMVP * vec4(aPos,1.0);
  }
`;
const fsSmooth = `
  precision mediump float;
  varying vec3 vNorm;
  varying vec3 vFragPos;
  uniform vec3 uLightPos;
  uniform vec3 uViewPos;
  uniform vec3 uColor;
  uniform vec3 uColor2;
  uniform float uHeightFrac; // 0=bottom 1=top, used for color gradient
  void main(){
    vec3 N = normalize(vNorm);
    vec3 L = normalize(uLightPos - vFragPos);
    vec3 V = normalize(uViewPos  - vFragPos);
    vec3 R = reflect(-L, N);
    float ambient  = 0.14;
    float diffuse  = max(dot(N,L), 0.0);
    float specular = pow(max(dot(R,V),0.0), 48.0);
    // color shifts from teal (bottom) to warm white (top) to sell the Escher loop feel
    vec3 base = mix(uColor, uColor2, clamp(vFragPos.y * 0.4 + 0.5, 0.0, 1.0));
    vec3 col  = base*(ambient + diffuse*0.74) + vec3(1.0)*specular*0.55;
    gl_FragColor = vec4(col,1.0);
  }
`;

// ─── Compile helpers ──────────────────────────────────────────────────────────
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error('Shader error:', gl.getShaderInfoLog(s));
  return s;
}
function makeProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    console.error('Program error:', gl.getProgramInfoLog(p));
  return p;
}

const progWire   = makeProgram(vsWire,   fsWire);
const progFlat   = makeProgram(vsFlat,   fsFlat);
const progSmooth = makeProgram(vsSmooth, fsSmooth);

// ─── Matrix math ──────────────────────────────────────────────────────────────
const identity = () => { const m=new Float32Array(16); m[0]=m[5]=m[10]=m[15]=1; return m; };

function multiply(a,b) {
  const o=new Float32Array(16);
  for(let c=0;c<4;c++) for(let r=0;r<4;r++){
    let s=0; for(let k=0;k<4;k++) s+=a[k*4+r]*b[c*4+k]; o[c*4+r]=s;
  }
  return o;
}
function perspective(fov,asp,n,f){
  const m=new Float32Array(16),fl=1/Math.tan(fov/2),nf=1/(n-f);
  m[0]=fl/asp;m[5]=fl;m[10]=(f+n)*nf;m[11]=-1;m[14]=2*f*n*nf; return m;
}
function translate(x,y,z){ const m=identity();m[12]=x;m[13]=y;m[14]=z;return m; }
function rotateX(a){ const m=identity(),c=Math.cos(a),s=Math.sin(a);m[5]=c;m[9]=-s;m[6]=s;m[10]=c;return m; }
function rotateY(a){ const m=identity(),c=Math.cos(a),s=Math.sin(a);m[0]=c;m[8]=s;m[2]=-s;m[10]=c;return m; }
function rotateZ(a){ const m=identity(),c=Math.cos(a),s=Math.sin(a);m[0]=c;m[4]=-s;m[1]=s;m[5]=c;return m; }
function normalMat(m){ return new Float32Array([m[0],m[1],m[2],m[4],m[5],m[6],m[8],m[9],m[10]]); }
function scaleM(sx,sy,sz){ const m=identity();m[0]=sx;m[5]=sy;m[10]=sz;return m; }

// ─── Geometry builder ─────────────────────────────────────────────────────────
//
// Strategy: generate a spiral staircase as a series of rectangular steps.
// Each step = one box, placed along a helical path.
//
// For each step i:
//   angle  = i / totalSteps * 2π  (evenly distributed around the circle)
//   height = i / totalSteps * totalRise  (rises one full loop)
//   x,z    = cos/sin of angle * radius  (position on the ring)
//
// Each box has 6 faces × 2 triangles × 3 vertices.
// We store positions and normals in flat arrays (duplicated vertices for flat shading).
// A separate smooth-vertex build is used for smooth/wireframe modes.

function buildStaircase(numSteps, stepH, stepD, radius) {
  // Flat geometry (duplicated verts per face for correct face normals)
  const flatPos=[], flatNorm=[];
  // Smooth geometry (shared verts, index buffer)
  const smPos=[], smNorm=[], smIdx=[];

  const totalAngle = 2 * Math.PI;           // full loop
  const totalRise  = numSteps * stepH / 100; // total vertical height of the loop

  const stepW = 0.28;   // width (thickness) of each step slab — fixed, looks good
  const sH    = stepH / 100;
  const sD    = stepD / 100;
  const R     = radius / 100;

  // Helper: add a quad (2 triangles) to the flat arrays with a given face normal
  function addFlatFace(verts, normal) {
    // verts: array of 4 vec3 corners [A,B,C,D]
    // Triangle 1: A,B,C   Triangle 2: A,C,D
    const tris = [
      verts[0],verts[1],verts[2],
      verts[0],verts[2],verts[3],
    ];
    for (const v of tris) {
      flatPos.push(...v);
      flatNorm.push(...normal);
    }
  }

  // Helper: add a box to the flat arrays given 8 corners
  // corners order: [0]=front-bottom-left [1]=front-bottom-right
  //                [2]=front-top-right   [3]=front-top-left
  //                [4]=back-bottom-left  [5]=back-bottom-right
  //                [6]=back-top-right    [7]=back-top-left
  function addBox(c) {
    // cross product for face normal
    const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
    const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
    const nrm=v=>{const l=Math.hypot(...v)||1;return v.map(x=>x/l);};
    const faceNorm=(a,b,d)=>nrm(cross(sub(b,a),sub(d,a)));

    // Front face  (c[0],c[1],c[2],c[3])
    addFlatFace([c[0],c[1],c[2],c[3]], faceNorm(c[0],c[1],c[3]));
    // Back face   (c[5],c[4],c[7],c[6])
    addFlatFace([c[5],c[4],c[7],c[6]], faceNorm(c[5],c[4],c[6]));
    // Top face    (c[3],c[2],c[6],c[7])
    addFlatFace([c[3],c[2],c[6],c[7]], faceNorm(c[3],c[2],c[7]));
    // Bottom face (c[4],c[5],c[1],c[0])
    addFlatFace([c[4],c[5],c[1],c[0]], faceNorm(c[4],c[5],c[0]));
    // Right face  (c[1],c[5],c[6],c[2])
    addFlatFace([c[1],c[5],c[6],c[2]], faceNorm(c[1],c[5],c[2]));
    // Left face   (c[4],c[0],c[3],c[7])
    addFlatFace([c[4],c[0],c[3],c[7]], faceNorm(c[4],c[0],c[7]));
  }

  // Smooth box helper — shared vertices, averaged normals, index buffer
  function addSmoothBox(c) {
    const base = smPos.length / 3;

    // Face normals for each of the 6 faces
    const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
    const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
    const nrm=v=>{const l=Math.hypot(...v)||1;return v.map(x=>x/l);};

    // 8 corners → unique vertices
    for (const v of c) { smPos.push(...v); }

    // Accumulate normals per corner (start at zero)
    const accN = Array.from({length:8},()=>[0,0,0]);
    const faces = [
      [0,1,2,3],[5,4,7,6],[3,2,6,7],[4,5,1,0],[1,5,6,2],[4,0,3,7]
    ];
    for (const f of faces) {
      const n = nrm(cross(sub(c[f[1]],c[f[0]]),sub(c[f[3]],c[f[0]])));
      for (const fi of f) { accN[fi][0]+=n[0];accN[fi][1]+=n[1];accN[fi][2]+=n[2]; }
    }
    for (const n of accN) {
      const l=Math.hypot(...n)||1;
      smNorm.push(n[0]/l,n[1]/l,n[2]/l);
    }

    // Index the 6 faces
    for (const f of faces) {
      const [a,b,cc,d]=f.map(i=>base+i);
      smIdx.push(a,b,cc, a,cc,d);
    }
  }

  // ── Generate steps ────────────────────────────────────────────────────────
  for (let i = 0; i < numSteps; i++) {
    const t      = i / numSteps;
    const angle  = t * totalAngle;
    const nextA  = ((i+1) / numSteps) * totalAngle;

    // Center of this step on the helix
    const cx = Math.cos(angle) * R;
    const cz = Math.sin(angle) * R;
    const cy = t * totalRise - totalRise/2; // vertically centered

    // Step slab orientation: tangent to the helix circle
    // The "forward" direction is the tangent to the circle at this angle
    const tang = [-Math.sin(angle), 0, Math.cos(angle)]; // tangent (horizontal)
    const out  = [ Math.cos(angle), 0, Math.sin(angle)]; // radial outward

    // Build the 8 corners of this step box:
    // The step extends:
    //   ±stepW/2 along the radial direction (width of the step)
    //   sD along the tangent direction (depth front to back)
    //   sH in Y (height of the step riser)

    const hw = stepW / 2;  // half-width (radial)

    // inner and outer radial offsets
    const innerX = cx - out[0]*hw,  innerZ = cz - out[2]*hw;
    const outerX = cx + out[0]*hw,  outerZ = cz + out[2]*hw;

    // front (current angle) and back (next angle) tangent offsets
    const frontX = 0, frontZ = 0; // no tangent offset at front
    const backX  = tang[0]*sD,    backZ  = tang[2]*sD;

    const yBot = cy;
    const yTop = cy + sH;

    // 8 corners:
    //  0 = inner front bottom,  1 = outer front bottom
    //  2 = outer front top,     3 = inner front top
    //  4 = inner back bottom,   5 = outer back bottom
    //  6 = outer back top,      7 = inner back top
    const corners = [
      [innerX+frontX, yBot, innerZ+frontZ],
      [outerX+frontX, yBot, outerZ+frontZ],
      [outerX+frontX, yTop, outerZ+frontZ],
      [innerX+frontX, yTop, innerZ+frontZ],
      [innerX+backX,  yBot, innerZ+backZ ],
      [outerX+backX,  yBot, outerZ+backZ ],
      [outerX+backX,  yTop, outerZ+backZ ],
      [innerX+backX,  yTop, innerZ+backZ ],
    ];

    addBox(corners);
    addSmoothBox(corners);
  }

  return {
    flat: {
      positions: new Float32Array(flatPos),
      normals:   new Float32Array(flatNorm),
      count:     flatPos.length / 3,
    },
    smooth: {
      positions: new Float32Array(smPos),
      normals:   new Float32Array(smNorm),
      indices:   new Uint16Array(smIdx),
      count:     smIdx.length,
    },
  };
}

// ─── GPU buffers ──────────────────────────────────────────────────────────────
const bFlatPos  = gl.createBuffer();
const bFlatNorm = gl.createBuffer();
const bSmPos    = gl.createBuffer();
const bSmNorm   = gl.createBuffer();
const bSmIdx    = gl.createBuffer();

let flatCount=0, smoothCount=0;

function uploadGeometry(steps, sh, sd, radius) {
  const geo = buildStaircase(steps, sh, sd, radius);
  flatCount   = geo.flat.count;
  smoothCount = geo.smooth.count;

  gl.bindBuffer(gl.ARRAY_BUFFER, bFlatPos);  gl.bufferData(gl.ARRAY_BUFFER, geo.flat.positions, gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, bFlatNorm); gl.bufferData(gl.ARRAY_BUFFER, geo.flat.normals,   gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, bSmPos);    gl.bufferData(gl.ARRAY_BUFFER, geo.smooth.positions,gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER, bSmNorm);   gl.bufferData(gl.ARRAY_BUFFER, geo.smooth.normals,  gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, bSmIdx); gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, geo.smooth.indices, gl.STATIC_DRAW);
}

// ─── Uniform helpers ──────────────────────────────────────────────────────────
function bindAttrib(prog, name, buf, size) {
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  const loc = gl.getAttribLocation(prog, name);
  if (loc < 0) return;
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
}
const um4 = (p,n,m) => gl.uniformMatrix4fv(gl.getUniformLocation(p,n),false,m);
const um3 = (p,n,m) => gl.uniformMatrix3fv(gl.getUniformLocation(p,n),false,m);
const u3f = (p,n,x,y,z) => gl.uniform3f(gl.getUniformLocation(p,n),x,y,z);
const u1f = (p,n,v) => gl.uniform1f(gl.getUniformLocation(p,n),v);

// ─── State ────────────────────────────────────────────────────────────────────
let angleX = 0.45, angleY = 0.5;
let zoom = 4.5;
let shadeMode = 'smooth';
let gravFlipped = false;
let gravAnim = 0;       // 0..1 tween for gravity roll
let spinning = false;
let autoSpinY = 0;

let numSteps = 16, stepH = 25, stepD = 28, stepRadius = 70;

let dragging=false, lastMX=0, lastMY=0;
canvas.addEventListener('mousedown', e=>{ dragging=true;lastMX=e.clientX;lastMY=e.clientY; spinning&&(autoSpinY=0); });
canvas.addEventListener('mouseup',   ()=>dragging=false);
canvas.addEventListener('mouseleave',()=>dragging=false);
canvas.addEventListener('mousemove', e=>{
  if(!dragging)return;
  angleY+=(e.clientX-lastMX)*0.01;
  angleX+=(e.clientY-lastMY)*0.01;
  lastMX=e.clientX;lastMY=e.clientY;
});
canvas.addEventListener('wheel', e=>{
  zoom=Math.max(2,Math.min(10,zoom+e.deltaY*0.006));
  e.preventDefault();
},{passive:false});

// ─── Buttons ──────────────────────────────────────────────────────────────────
function setShade(m){
  shadeMode=m;
  document.getElementById('btnWire').classList.toggle('active',m==='wire');
  document.getElementById('btnFlat').classList.toggle('active',m==='flat');
  document.getElementById('btnSmooth').classList.toggle('active',m==='smooth');
  document.getElementById('hudShade').textContent=m.toUpperCase();
}
document.getElementById('btnWire').onclick   = ()=>setShade('wire');
document.getElementById('btnFlat').onclick   = ()=>setShade('flat');
document.getElementById('btnSmooth').onclick = ()=>setShade('smooth');

document.getElementById('btnGrav').onclick = function(){
  gravFlipped = !gravFlipped;
  document.getElementById('hudGrav').textContent = gravFlipped ? '+Y (CEILING)' : '–Y (FLOOR)';
};

document.getElementById('btnSpin').onclick = function(){
  spinning=!spinning;
  autoSpinY = spinning ? 0.008 : 0;
  this.classList.toggle('active',spinning);
};

document.getElementById('btnReset').onclick = ()=>{
  angleX=0.45;angleY=0.5;zoom=4.5;
  gravFlipped=false;gravAnim=0;
  spinning=false;autoSpinY=0;
  document.getElementById('btnSpin').classList.remove('active');
  document.getElementById('hudGrav').textContent='–Y (FLOOR)';
  numSteps=16;stepH=25;stepD=28;stepRadius=70;
  document.getElementById('slSteps').value=16;
  document.getElementById('slHeight').value=25;
  document.getElementById('slDepth').value=28;
  document.getElementById('slRadius').value=70;
  document.getElementById('lblSteps').textContent=16;
  document.getElementById('hudSteps').textContent=16;
  uploadGeometry(16,25,28,70);
  setShade('smooth');
};

window.addEventListener('keydown',e=>{
  if(e.key==='1')setShade('wire');
  if(e.key==='2')setShade('flat');
  if(e.key==='3')setShade('smooth');
  if(e.key==='g'||e.key==='G') document.getElementById('btnGrav').click();
  if(e.key==='s'||e.key==='S') document.getElementById('btnSpin').click();
  if(e.key==='r'||e.key==='R') document.getElementById('btnReset').click();
});

// ─── Sliders ──────────────────────────────────────────────────────────────────
document.getElementById('slSteps').oninput=function(){
  numSteps=+this.value;
  document.getElementById('lblSteps').textContent=numSteps;
  document.getElementById('hudSteps').textContent=numSteps;
  uploadGeometry(numSteps,stepH,stepD,stepRadius);
};
document.getElementById('slHeight').oninput=function(){
  stepH=+this.value; uploadGeometry(numSteps,stepH,stepD,stepRadius);
};
document.getElementById('slDepth').oninput=function(){
  stepD=+this.value; uploadGeometry(numSteps,stepH,stepD,stepRadius);
};
document.getElementById('slRadius').oninput=function(){
  stepRadius=+this.value; uploadGeometry(numSteps,stepH,stepD,stepRadius);
};

// ─── Render loop ──────────────────────────────────────────────────────────────
let then=0;
function render(now){
  now*=0.001; const dt=Math.min(now-then,0.05); then=now;

  // Gravity tween
  const gravTarget = gravFlipped ? 1 : 0;
  gravAnim += (gravTarget-gravAnim) * Math.min(dt*3.5,1);

  // Auto spin
  if(spinning) angleY += autoSpinY;

  // HUD
  document.getElementById('hudRY').textContent=(((angleY*180/Math.PI)%360+360)%360).toFixed(1)+'°';

  gl.clearColor(0.015,0.02,0.03,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.viewport(0,0,canvas.width,canvas.height);

  // Gravity = roll 180° over time
  const gravRoll = gravAnim * Math.PI;

  // Model: gravity roll → user pitch → user yaw
  let model = identity();
  model = multiply(rotateZ(gravRoll), model);
  model = multiply(rotateX(angleX),   model);
  model = multiply(rotateY(angleY),   model);

  const view = translate(0,0,-zoom);
  const proj = perspective(Math.PI/4, canvas.width/canvas.height, 0.1, 60);
  const mvp  = multiply(proj, multiply(view, model));
  const nM   = normalMat(model);

  const lightPos = [3.0, 5.0, 4.0];
  const viewPos  = [0.0, 0.0, zoom];
  const colorA   = [0.22, 0.78, 0.75]; // teal
  const colorB   = [0.95, 0.90, 0.75]; // warm ivory top

  if(shadeMode==='wire'){
    gl.useProgram(progWire);
    bindAttrib(progWire,'aPos',bSmPos,3);
    um4(progWire,'uMVP',mvp);
    u3f(progWire,'uWireColor',...colorA);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,bSmIdx);
    gl.lineWidth(1.2);
    gl.drawElements(gl.LINES,smoothCount,gl.UNSIGNED_SHORT,0);
  }
  else if(shadeMode==='flat'){
    gl.useProgram(progFlat);
    bindAttrib(progFlat,'aPos', bFlatPos, 3);
    bindAttrib(progFlat,'aNorm',bFlatNorm,3);
    um4(progFlat,'uMVP',       mvp);
    um3(progFlat,'uNormalMat', nM);
    u3f(progFlat,'uLightDir',  0.557,0.742,0.371);
    u3f(progFlat,'uColor',     ...colorA);
    gl.drawArrays(gl.TRIANGLES,0,flatCount);
  }
  else{
    gl.useProgram(progSmooth);
    bindAttrib(progSmooth,'aPos', bSmPos, 3);
    bindAttrib(progSmooth,'aNorm',bSmNorm,3);
    um4(progSmooth,'uMVP',       mvp);
    um4(progSmooth,'uModel',     model);
    um3(progSmooth,'uNormalMat', nM);
    u3f(progSmooth,'uLightPos',  ...lightPos);
    u3f(progSmooth,'uViewPos',   ...viewPos);
    u3f(progSmooth,'uColor',     ...colorA);
    u3f(progSmooth,'uColor2',    ...colorB);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,bSmIdx);
    gl.drawElements(gl.TRIANGLES,smoothCount,gl.UNSIGNED_SHORT,0);
  }

  requestAnimationFrame(render);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
uploadGeometry(numSteps, stepH, stepD, stepRadius);
requestAnimationFrame(render);
</script>
